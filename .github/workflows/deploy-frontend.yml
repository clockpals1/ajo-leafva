name: Deploy Frontend → Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Patch fork-ts-checker ajv compatibility
        working-directory: frontend
        run: |
          mkdir -p node_modules/fork-ts-checker-webpack-plugin/node_modules
          cd node_modules/fork-ts-checker-webpack-plugin
          npm install ajv@6.12.6 --legacy-peer-deps --no-save

      - name: Build
        working-directory: frontend
        env:
          CI: "false"
          REACT_APP_BACKEND_URL: https://ajo-leafva.onrender.com
          GENERATE_SOURCEMAP: "false"
          NODE_OPTIONS: "--openssl-legacy-provider"
        run: npm run build

      - name: Create Cloudflare Pages project (if not exists)
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages project create ajo-leafva --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages deploy build --project-name=ajo-leafva --branch=main --commit-dirty=true
